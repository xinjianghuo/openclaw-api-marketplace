name: Build and Deploy ChurnBuster

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Install Dependencies
      run: npm ci

    - name: Run Tests
      run: node test.js

    - name: Build Executable
      run: node build.js

    - name: Create Release Zip
      run: |
        powershell Compress-Archive -Path dist/churnbuster.exe -DestinationPath churnbuster-v1.0.0.zip -Force

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: churnbuster-windows
        path: |
          dist/churnbuster.exe
          churnbuster-v1.0.0.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/churnbuster.exe
          churnbuster-v1.0.0.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload Sales Page
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        # 只上传销售页相关文件
        # 实际使用时可能需要调整

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
