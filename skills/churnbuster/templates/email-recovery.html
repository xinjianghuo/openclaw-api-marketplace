<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>更新您的支付方式</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: #4F46E5; color: white; padding: 20px; text-align: center; }
    .content { padding: 30px; }
    .button { display: inline-block; background: #4F46E5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; margin: 20px 0; }
    .footer { color: #666; font-size: 12px; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>我们需要更新您的支付方式</h1>
  </div>
  <div class="content">
    <p>您好 {{customer_name}},</p>
    <p>我们尝试处理您的定期付款时失败了。这意味着您的订阅可能会被暂停。</p>
    <p>请点击下方按钮更新您的支付方式,只需 2 分钟:</p>
    <a href="{{update_link}}" class="button">更新支付方式</a>
    <p>如果按钮无法点击,请复制以下链接到浏览器:</p>
    <p>{{update_link}}</p>
    <p>如果您需要帮助,请回复此邮件。</p>
    <p>谢谢!<br>{{company_name}}</p>
  </div>
  <div class="footer">
    <p>此邮件由 ChurnBuster 自动发送。如果您认为这是错误,请联系我们。</p>
  </div>
</body>
</html>
